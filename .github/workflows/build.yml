name: Build and Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'  # Hourly
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Debug - List files
        run: ls -la

      - name: Install dependencies
        run: npm ci

      - name: Debug - Check eleventy config
        run: cat eleventy.config.js

      - name: Fetch Google Sheets data
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT" ]; then
            echo "$GOOGLE_SERVICE_ACCOUNT" > service-account.json
            npm run fetch-sheets || echo "Fetch failed, continuing with local data"
          else
            echo "No Google service account configured, using local data"
          fi

      - name: Build site
        run: npm run build

      - name: Debug - Check output
        run: |
          ls -la _site/
          head -20 _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
